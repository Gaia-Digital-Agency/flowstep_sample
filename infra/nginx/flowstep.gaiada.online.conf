# ── flowstep.gaiada.online — Vite SPA + Payload CMS (PM2: flowstep-cms :3030)
# This block is intended to be appended to the existing
# /etc/nginx/sites-available/subdomains.gaiada.online file (Gaia convention)
# OR symlinked on its own. TLS issuance via certbot --nginx.

server {
    listen 80;
    listen [::]:80;
    server_name flowstep.gaiada.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name flowstep.gaiada.online;

    ssl_certificate     /etc/letsencrypt/live/flowstep.gaiada.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowstep.gaiada.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    client_max_body_size 6M;

    # ── Static SPA root: /var/www/flowstep/current/packages/web/dist
    root /var/www/flowstep/current/packages/web/dist;
    index index.html;

    # Hashed asset bundles — long cache, immutable
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Static files in /public (favicon, robots, sitemap, etc.)
    location ~* \.(svg|png|jpg|jpeg|webp|ico|txt|xml)$ {
        expires 1d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }

    # Payload admin UI + REST/GraphQL → CMS service
    location /admin {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payload-uploaded media
    location /media/ {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
    }

    # SPA fallback — all other routes return index.html so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
